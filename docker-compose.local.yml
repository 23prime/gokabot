services:
  gokabot-core-local:
    image: gokabot-core-local
    container_name: gokabot-core-local
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - /etc/localtime:/etc/localtime:ro
    environment:
      TZ: Asia/Tokyo
      RACK_ENV: development
      DATABASE_URL: postgres://postgres:password@postgres:5432/gokabot_db
      LINE_CHANNEL_TOKEN: test_channel_token
      LINE_CHANNEL_SECRET: test_channel_secret
      GOKABOU_USER_ID: test_gokabou_user
      TAKENOKO_USER_ID: test_takenoko_user
      NGA_GROUP_ID: test_nga_group
      KMT_GROUP_ID: test_kmt_group
      OPEN_WEATHER_API_KEY: test_api_key
      DISCORD_TARGET_CHANNEL_ID: test_discord_channel
      DISCORD_BOT_TOKEN: test_discord_token
    build:
      context: core-api
    ports:
      - "8080:8080"
    command:
      [
        "bundle",
        "exec",
        "rackup",
        "app/config.ru",
        "-o",
        "0.0.0.0",
        "-p",
        "8080",
      ]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/"]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 10s

  postgres:
    image: postgres:16
    container_name: gokabot-postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      TZ: Asia/Tokyo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: gokabot_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 30

  gokabot-api-go-local:
    image: gokabot-api-go-local
    container_name: gokabot-api-go-local
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:password@postgres:5432/gokabot_db?sslmode=disable
      PORT: 8081
      LOG_LEVEL: DEBUG
      LINE_CHANNEL_SECRET: test_channel_secret
    build:
      context: gokabot-api-go
      dockerfile: Dockerfile.dev
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8081/healthCheck"]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 10s


  runn-go:
    image: ghcr.io/k1low/runn:latest
    container_name: gokabot-runn-go
    volumes:
      - ./gokabot-api-go/tests:/tests:ro
    working_dir: /tests
    command:
      [
        "run",
        "*.yaml",
        "--runner",
        "req:http://gokabot-api-go-local:8081",
        "--verbose",
      ]
    profiles:
      - test-go

  gokabot-demo:
    image: gokabot-demo
    container_name: gokabot-demo
    environment:
      TZ: Asia/Tokyo
    build:
      context: gokabot-demo
    ports:
      - "3000:3000"
    command: ["yarn", "vite"]
    profiles:
      - demo

  metabase:
    # see: https://www.metabase.com/docs/latest/operations-guide/running-metabase-on-docker.html
    image: metabase/metabase
    container_name: gokabot-metabase
    volumes:
      - ~/.metabase:/metabase-data
    environment:
      TZ: Asia/Tokyo
      MB_DB_FILE: /metabase-data/metabase.db
    ports:
      - "5000:3000"
    profiles:
      - metabase

volumes:
  postgres-data:
