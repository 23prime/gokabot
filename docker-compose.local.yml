services:
  gokabot-core-local:
    image: gokabot-core-local
    container_name: gokabot-core-local
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - /etc/localtime:/etc/localtime:ro
    environment:
      TZ: Asia/Tokyo
      RACK_ENV: development
      DATABASE_URL: postgres://postgres:password@postgres:5432/gokabot_db
      LINE_CHANNEL_SECRET: test_channel_secret
    env_file:
      - core-api/.env
    build:
      context: core-api
    ports:
      - "8080:8080"
    command:
      [
        "bundle",
        "exec",
        "rackup",
        "app/config.ru",
        "-o",
        "0.0.0.0",
        "-p",
        "8080",
      ]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/"]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 10s

  postgres:
    image: postgres:16
    container_name: gokabot-postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      TZ: Asia/Tokyo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: gokabot_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 30

  hurl:
    image: ghcr.io/orange-opensource/hurl:7.1.0
    container_name: gokabot-hurl
    volumes:
      - ./tests:/tests:ro
    working_dir: /tests
    command:
      [
        "--test",
        "--glob",
        "api/**/*.hurl",
        "--variable",
        "host=http://gokabot-core-local:8080",
      ]
    profiles:
      - test

  gokabot-demo:
    image: gokabot-demo
    container_name: gokabot-demo
    environment:
      TZ: Asia/Tokyo
    build:
      context: gokabot-demo
    ports:
      - "3000:3000"
    command: ["yarn", "vite"]
    profiles:
      - demo

  metabase:
    # see: https://www.metabase.com/docs/latest/operations-guide/running-metabase-on-docker.html
    image: metabase/metabase
    container_name: gokabot-metabase
    volumes:
      - ~/.metabase:/metabase-data
    environment:
      TZ: Asia/Tokyo
      MB_DB_FILE: /metabase-data/metabase.db
    ports:
      - "5000:3000"
    profiles:
      - metabase

volumes:
  postgres-data:
