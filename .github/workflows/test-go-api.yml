name: Integration Test Go API

on:
  push:
    branches:
      - main
    paths:
      - "gokabot-api-go/**"
      - "db/migrations/**"
      - "gokabot-api-go/tests/**"
      - "docker-compose.yml"
  pull_request:
    paths:
      - "gokabot-api-go/**"
      - "db/migrations/**"
      - "gokabot-api-go/tests/**"
      - "docker-compose.yml"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Create .env from secrets
        run: |
          echo "LINE_CHANNEL_TOKEN=${{ secrets.LINE_CHANNEL_TOKEN }}" >> .env
          echo "LINE_PUSH_TARGET_ID=${{ secrets.LINE_PUSH_TARGET_ID }}" >> .env

      - name: Set up mise
        uses: jdx/mise-action@v3
        with:
          install_args: "dbmate"
          cache: true
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull
        run: mise dc-pull

      - name: Build Go API
        run: mise dc-go-build

      - name: Start DB
        run: mise dc-up-db-d

      - name: DB Migrations
        run: mise db-migrate

      - name: Seeding
        run: mise db-seed-test

      - name: Start Go API
        run: mise dc-go-up-d

      - name: Run Go API tests
        run: mise test-go-api

      - name: Show logs on failure
        if: failure()
        run: docker compose logs gokabot-api-go-local

      - name: Cleanup
        if: always()
        run: docker compose down -v
