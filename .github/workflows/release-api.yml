name: Release API

on:
  push:
    branches:
      - main
    paths:
      - "gokabot-api-go/**"
      - ".github/workflows/release-api.yml"
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@acca2b1b2070338fb9fd1ca27ecee81d687e58e5 # v6.1.2
        with:
          role-to-assume: arn:aws:iam::678084882233:role/gokabot-github-actions
          aws-region: ap-northeast-1

      - name: Build image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: gokabot-api-go
          push: false
          load: true
          tags: gokabot-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install lightsailctl
        run: |
          curl -sL https://s3.us-west-2.amazonaws.com/lightsailctl/latest/linux-amd64/lightsailctl \
            -o /usr/local/bin/lightsailctl
          chmod +x /usr/local/bin/lightsailctl

      - name: Push to Lightsail registry
        id: push
        run: |
          OUTPUT=$(aws lightsail push-container-image \
            --region ap-northeast-1 \
            --service-name gokabot-api \
            --label gokabot-api \
            --image gokabot-api:${{ github.sha }})
          echo "$OUTPUT"
          IMAGE=$(echo "$OUTPUT" | grep -oP '(?<=Refer to this image as "):.*(?=")')
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Deploy to Lightsail
        run: |
          aws lightsail create-container-service-deployment \
            --region ap-northeast-1 \
            --service-name gokabot-api \
            --containers "{
              \"gokabot-api\": {
                \"image\": \"${{ steps.push.outputs.image }}\",
                \"ports\": {\"8081\": \"HTTP\"},
                \"environment\": {
                  \"PORT\": \"8081\",
                  \"LINE_CHANNEL_SECRET\": \"${{ secrets.LINE_CHANNEL_SECRET }}\",
                  \"LINE_CHANNEL_TOKEN\": \"${{ secrets.LINE_CHANNEL_TOKEN }}\",
                  \"DATABASE_URL\": \"${{ secrets.DATABASE_URL }}\",
                  \"OPEN_WEATHER_API_KEY\": \"${{ secrets.OPEN_WEATHER_API_KEY }}\",
                  \"GOKABOU_USER_ID\": \"${{ secrets.GOKABOU_USER_ID }}\"
                }
              }
            }" \
            --public-endpoint "{
              \"containerName\": \"gokabot-api\",
              \"containerPort\": 8081,
              \"healthCheck\": {\"path\": \"/healthCheck\"}
            }"
