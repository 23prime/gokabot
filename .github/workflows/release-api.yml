name: Release API

on:
  push:
    branches:
      - main
    paths:
      - "gokabot-api-go/**"
      - ".github/workflows/release-api.yml"
  pull_request:
    paths:
      - "gokabot-api-go/**"
      - ".github/workflows/release-api.yml"
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: gokabot-api-go
          push: false
          tags: gokabot-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
