name: Release API

on:
  push:
    branches:
      - main
      - feature/lets-go-api  # TODO: remove after merging to main
    paths:
      - "gokabot-api-go/**"
      - ".github/workflows/release-api.yml"
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::678084882233:role/gokabot-github-actions
          aws-region: ap-northeast-1

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: gokabot-api-go
          push: false
          load: true
          tags: gokabot-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install lightsailctl
        run: |
          curl -sL https://s3.us-west-2.amazonaws.com/lightsailctl/latest/linux-amd64/lightsailctl \
            -o /usr/local/bin/lightsailctl
          chmod +x /usr/local/bin/lightsailctl

      - name: Push to Lightsail registry
        run: |
          aws lightsail push-container-image \
            --region ap-northeast-1 \
            --service-name gokabot-api \
            --label gokabot-api \
            --image gokabot-api:${{ github.sha }}
