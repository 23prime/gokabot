name: Check API

on:
  push:
    branches:
      - main
    paths:
      - "gokabot-api-go/**"
      - ".github/workflows/check-api.yml"
  pull_request:
    paths:
      - "gokabot-api-go/**"
      - ".github/workflows/check-api.yml"

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up mise
        uses: jdx/mise-action@v3
        with:
          install_args: "go golangci-lint"
          cache: true
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Lint
        run: mise go-lint

      - name: Unit test
        run: mise go-test

      - name: Build
        run: mise go-build
