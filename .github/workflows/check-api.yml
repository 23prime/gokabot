name: Check API

on:
  push:
    branches:
      - main
    paths:
      - "gokabot-api-go/**"
      - ".github/workflows/check-api.yml"
  pull_request:
    paths:
      - "gokabot-api-go/**"
      - ".github/workflows/check-api.yml"

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install_args: "go golangci-lint"
          cache: true
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Lint
        run: mise go-lint

      - name: Unit test
        run: mise go-test

      - name: Build
        run: mise go-build
