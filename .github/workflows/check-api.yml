name: Check API

on:
  push:
    branches:
      - main
    paths:
      - "gokabot-api-go/**"
      - ".github/workflows/check-api.yml"
  pull_request:
    paths:
      - "gokabot-api-go/**"
      - ".github/workflows/check-api.yml"

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          install_args: "go golangci-lint"
          cache: true
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Lint
        run: mise go-lint

      - name: Unit test
        run: mise go-test

      - name: Build
        run: mise go-build
