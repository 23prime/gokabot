name: Test API

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up mise
        uses: jdx/mise-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull
        run: mise pull

      - name: Build
        run: mise build

      - name: Start DB
        run: mise up-db-d

      - name: DB Migrations
        run: mise db-migrate

      - name: Seeding
        run: mise db-seed

      - name: Start API
        run: mise up-api-d

      - name: Run API tests
        run: mise test-api

      - name: Show logs on failure
        if: failure()
        run: docker compose -f docker-compose.local.yml logs gokabot-core-local
