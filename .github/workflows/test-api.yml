name: Test API

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up mise
        uses: jdx/mise-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Pull
        run: |
          docker compose -f docker-compose.local.yml pull

      - name: Build
        run: |
          docker compose -f docker-compose.local.yml build gokabot-core-local

      - name: Start services
        run: |
          docker compose -f docker-compose.local.yml up -d --wait postgres gokabot-core-local

      - name: Run API tests
        run: mise test-api

      - name: Show logs on failure
        if: failure()
        run: |
          docker compose -f docker-compose.local.yml logs gokabot-core-local
